{% extends "base.html" %}
{% block title %}First-Run Setup — SAR Redact{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-brand">SAR Redact</div>
        <h1 class="auth-title">Create admin account</h1>
        <p class="auth-subtitle">No users exist yet. Set up the first admin account to get started.</p>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/setup">
            <div class="form-group">
                <label for="display_name">Full name</label>
                <input type="text" id="display_name" name="display_name" class="form-input"
                       placeholder="e.g. Jane Smith" autocomplete="name" autofocus required>
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-input"
                       placeholder="e.g. jsmith" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password <span style="color:var(--text-tertiary);font-weight:400;">(min 8 characters)</span></label>
                <input type="password" id="password" name="password" class="form-input"
                       autocomplete="new-password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-input"
                       autocomplete="new-password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">Create admin &amp; sign in</button>
        </form>
    </div>
</div>
{% endblock %}
